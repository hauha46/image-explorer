<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 3D Scene Reconstructor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    /* ── Info Bar ── */
    #info {
      position: absolute;
      top: 16px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      z-index: 100;
      pointer-events: none;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    /* ── Blocker / Overlay ── */
    #blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 12, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 50;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .upload-container {
      background: rgba(20, 20, 35, 0.95);
      padding: 48px 56px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
      max-width: 480px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .upload-container p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    input[type="file"] {
      margin: 20px 0 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    input[type="file"]::file-selector-button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    button {
      padding: 12px 36px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Progress ── */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 24px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1, #a855f7);
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .progress-text {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      height: 16px;
      letter-spacing: 0.3px;
    }

    /* ── Controls Hint ── */
    .controls-hint {
      margin-top: 16px !important;
      font-size: 12px !important;
      color: rgba(255, 255, 255, 0.35) !important;
      letter-spacing: 0.4px;
    }

    /* ── FPS Crosshair ── */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 1px;
    }

    #crosshair::before {
      width: 16px;
      height: 2px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #crosshair::after {
      width: 2px;
      height: 16px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>
  <div id="info">Interactive 3D Scene Reconstruction</div>

  <div id="crosshair"></div>

  <div id="blocker">
    <div class="upload-container">
      <h1>Image → 3D Space</h1>
      <p>Upload a photo to reconstruct it as an explorable 3D scene.</p>

      <input type="file" id="file-upload" accept="image/*">
      <br>
      <button id="upload-btn">Generate Scene</button>

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-text"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
