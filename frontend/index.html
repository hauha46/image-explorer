<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 3D Scene Reconstructor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    /* ── Info Bar ── */
    #info {
      position: absolute;
      top: 16px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      z-index: 100;
      pointer-events: none;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    /* ── Blocker / Overlay ── */
    #blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 12, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 50;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .upload-container {
      background: rgba(20, 20, 35, 0.95);
      padding: 48px 56px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
      max-width: 520px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .upload-container p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    input[type="file"] {
      margin: 20px 0 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    input[type="file"]::file-selector-button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    select {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    select option {
      background: #1a1a2e;
      color: white;
    }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }

    .form-row label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
    }

    button {
      padding: 12px 36px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
      font-size: 13px;
      padding: 8px 20px;
    }

    button.secondary:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: none;
    }

    button.secondary.active {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
    }

    /* ── Progress ── */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      margin-top: 24px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1, #a855f7);
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .progress-text {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      height: 16px;
      letter-spacing: 0.3px;
    }

    /* ── Controls Hint ── */
    .controls-hint {
      margin-top: 16px !important;
      font-size: 12px !important;
      color: rgba(255, 255, 255, 0.35) !important;
      letter-spacing: 0.4px;
    }

    /* ── FPS Crosshair ── */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      pointer-events: none;
      display: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 1px;
    }

    #crosshair::before {
      width: 16px;
      height: 2px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #crosshair::after {
      width: 2px;
      height: 16px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Mode Toggle Bar ── */
    #mode-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      display: none;
      gap: 8px;
      align-items: center;
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(8px);
      padding: 6px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* ── Orbit Viewer Canvas ── */
    #orbit-viewer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background: #000;
      z-index: 5;
      cursor: grab;
    }

    #orbit-viewer:active {
      cursor: grabbing;
    }

    #orbit-viewer canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #orbit-frame-counter {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 160;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      pointer-events: none;
      display: none;
    }
    /* ── Text Input ── */
    input[type="text"] {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      width: 260px;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.5);
    }
  </style>
</head>

<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <div id="info">Interactive 3D Scene Reconstruction</div>

  <div id="crosshair"></div>

  <!-- Orbit frame viewer (hidden until activated) -->
  <div id="orbit-viewer">
    <canvas id="orbit-canvas"></canvas>
  </div>
  <div id="orbit-frame-counter"></div>

  <div id="blocker">
    <div class="upload-container" id="upload-panel">
      <h1>AI 3D Scene Reconstructor</h1>
      <p>Upload an image to generate novel views and a 3D point cloud.</p>

      <input type="file" id="file-input" accept="image/*">

      <div class="form-row">
        <label for="model-select">Model:</label>
        <select id="model-select">
          <option value="svd">SVD — Video Diffusion (fast, general)</option>
          <option value="viewcrafter">ViewCrafter — Point Cloud Guided (text prompt)</option>
          <option value="seva">SEVA — Stable Virtual Camera (orbit, best quality)</option>
          <option value="seva_4070ti">SEVA (4070 Ti Optimized) — faster, lighter</option>
          <option value="sv3d">SV3D — Stable Video 3D (orbital, object-centric)</option>
          <option value="zero123pp">Zero123++ — Multi-View Grid (6 views)</option>
          <option value="vivid">VIVID — Video Diffusion</option>
          <option value="panodreamer">PanoDreamer — Panoramic (text prompt)</option>
        </select>
      </div>

      <div class="form-row" id="prompt-row" style="display: none;">
        <label for="prompt-input">Prompt:</label>
        <input type="text" id="prompt-input" placeholder="e.g. Rotating view of a building">
      </div>

      <button id="upload-btn" disabled>Generate Scene</button>

      <div style="margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;">
        <p style="font-size: 12px; color: rgba(255,255,255,0.35);">Or load a pre-generated test scene:</p>
        <button id="load-test-btn" class="secondary" style="margin-top: 8px;">Load Test Scene</button>
      </div>

      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text"></div>
    </div>
  </div>

  <!-- Mode toggle bar (shown after a scene is loaded) -->
  <div id="mode-bar">
    <button class="secondary active" id="mode-orbit-btn">Orbit Frames</button>
    <button class="secondary" id="mode-3d-btn">3D Explore</button>
    <button class="secondary" id="mode-fps-btn">FPS Walk</button>
    <span style="width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 4px;"></span>
    <button class="secondary" id="new-scene-btn">New Scene</button>
  </div>

  <script type="module" src="/static/main.js"></script>
</body>

</html>
